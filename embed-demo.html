<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字音字形改錯 — 嵌入示範</title>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; margin: 24px; background: #eef2f7; }
    h1 { font-size: 1.25rem; }
    .frame-wrap { max-width: 920px; margin-top: 16px; background: #fff; padding: 12px; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    iframe { display: block; width: 100%; height: 500px; border: 0; border-radius: 10px; }
    code { background: #f4f6fa; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>字音字形改錯 — iframe 嵌入示範</h1>
  <p>下方為 <code>embed.html</code>。語詞與多音字由試算表提供，畫面使用 <strong>ToneOZ 多音字字型</strong> 原樣顯示（不轉拼音）。</p>
  <div class="frame-wrap">
    <iframe
      src="embed.html"
      title="字音字形改錯"
      allow="autoplay"
    ></iframe>
  </div>
  <p>嵌入其他網站時，請將 <code>src</code> 改為你的網域，並可加上 <code>?sheet_id=…&amp;gid=…</code>。</p>
</body>
</html>
